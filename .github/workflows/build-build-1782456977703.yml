name: Build Flutter APK build-1782456977703

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - run: |
          wget -O project.zip "https://github.com/ObyMoods/webApk/releases/download/build-1782456977703/BASE%20APK%20DOMINOS%20V6.zip"
          unzip -o project.zip -d .
          rm project.zip
          flutter clean
          flutter pub get
          flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
    