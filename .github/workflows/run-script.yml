name: Auto Run Script (Multi-Language)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      language:
        description: 'Bahasa script (node/python)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - node
          - python

jobs:
  auto-run:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Auto-detect language
      id: detect_lang
      run: |
        LANGUAGE="${{ github.event.inputs.language }}"
        
        if [ "$LANGUAGE" = "auto" ]; then
          # Deteksi berdasarkan file
          if [ -f "package.json" ]; then
            LANGUAGE="node"
          elif [ -f "requirements.txt" ]; then
            LANGUAGE="python"
          elif [ -f "index.js" ] || [ -f "main.js" ]; then
            LANGUAGE="node"
          elif [ -f "main.py" ] || [ -f "app.py" ]; then
            LANGUAGE="python"
          else
            LANGUAGE="node"  # Default
          fi
        fi
        
        echo "language=$LANGUAGE" >> $GITHUB_OUTPUT
        echo "🔍 Detected language: $LANGUAGE" >> $GITHUB_STEP_SUMMARY
        
    - name: Setup Node.js
      if: steps.detect_lang.outputs.language == 'node'
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: package-lock.json
        
    - name: Setup Python
      if: steps.detect_lang.outputs.language == 'python'
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install Node dependencies
      if: steps.detect_lang.outputs.language == 'node'
      run: |
        if [ -f "package.json" ]; then
          if [ -f "package-lock.json" ]; then
            npm ci --only=production || npm install --production
          else
            npm install --only=production || npm install
            npm install --package-lock-only
          fi
        fi
        
    - name: Install Python dependencies
      if: steps.detect_lang.outputs.language == 'python'
      run: |
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        fi
        
    - name: Find main file
      id: find_main
      run: |
        if [ "${{ steps.detect_lang.outputs.language }}" = "node" ]; then
          MAIN_FILE="index.js"
          for file in index.js main.js app.js server.js bot.js; do
            if [ -f "$file" ]; then
              MAIN_FILE="$file"
              break
            fi
          done
        else
          MAIN_FILE="main.py"
          for file in main.py app.py bot.py script.py; do
            if [ -f "$file" ]; then
              MAIN_FILE="$file"
              break
            fi
          done
        fi
        
        echo "main_file=$MAIN_FILE" >> $GITHUB_OUTPUT
        echo "📄 Main file: $MAIN_FILE" >> $GITHUB_STEP_SUMMARY
        
    - name: Run script
      id: run_script
      run: |
        MAIN_FILE="${{ steps.find_main.outputs.main_file }}"
        LANGUAGE="${{ steps.detect_lang.outputs.language }}"
        
        echo "🚀 Running $LANGUAGE script: $MAIN_FILE"
        
        if [ "$LANGUAGE" = "node" ]; then
          node "$MAIN_FILE" 2>&1 | tee output.txt
        else
          python3 "$MAIN_FILE" 2>&1 | tee output.txt
        fi
        
        echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        
    - name: Save results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs-${{ github.run_id }}
        path: output.txt
        retention-days: 7
