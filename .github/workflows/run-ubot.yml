name: Run Ubot ubot_manager_mongodb

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-ubot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip python3-venv libjpeg-dev zlib1g-dev ffmpeg unzip
        
    - name: Extract
      run: |
        ZIP_FILE=$(find . -name "*.zip" -type f | head -1)
        mkdir -p project/
        unzip -o "$ZIP_FILE" -d project/
        ls -la project/
        
    - name: Setup Python
      run: |
        cd project/
        python3 -m venv ubotMacha
        source ubotMacha/bin/activate
        pip3 install --upgrade pip
        pip3 install tornado pyrogram tgcrypto pillow pymongo motor
        
    - name: Install req
      run: |
        cd project/
        source ubotMacha/bin/activate
        
        if [ -f "requirements.txt" ]; then
          pip3 install -r requirements.txt || true
        fi
        
        pip3 install aiohttp aiofiles beautifulsoup4 requests pytz python-dotenv psutil
        
    - name: Setup .env
      run: |
        cd project/
        
        # Hapus .env lama jika ada
        rm -f .env
        
        # Buat .env baru dengan konfigurasi dari user
        cat > .env << 'EOF'
MAX_BOT = 999
DEVS = 1816668696,1216141423
API_ID = 33630270
API_HASH = 9bc8ac896222af1a2053bf4375615caa
BOT_TOKEN = 8708318488:AAG5GdBBLuU77zsD9BP6e140sGaRvEezLvo
OWNER_ID = 1816668696,1216141423
BLACKLIST_CHAT = -1003640088866 
RMBG_API = Y8mKMpDEsaZsvRikj4xk8xRR
MONGO_URL = mongodb+srv://zidanlupi16_db_user:<db_password>@cluster0.eqhavxf.mongodb.net/?appName=Cluster0
LOGS_MAKER_UBOT = -1003878688914
API_KEY = _@PutraGanaReal55
EOF
        
        echo "✅ .env created with user config"
        echo "📄 .env content:"
        cat .env
        
    - name: Run Ubot
      run: |
        cd project/
        source ubotMacha/bin/activate
        
        export PYTHONPATH="$(pwd):$PYTHONPATH"
        
        if [ -f "__main__.py" ]; then
          python3 __main__.py
        elif [ -f "main.py" ]; then
          python3 main.py
        elif [ -f "bot.py" ]; then
          python3 bot.py
        else
          echo "No main file found!"
          find . -name "*.py" -type f
          exit 1
        fi
    