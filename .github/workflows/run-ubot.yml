name: Run Ubot ubot_manager_mongodb

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-ubot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip python3-venv libjpeg-dev zlib1g-dev ffmpeg unzip
        
    - name: Extract
      run: |
        ZIP_FILE=$(find . -name "*.zip" -type f | head -1)
        mkdir -p ajg/
        unzip -o "$ZIP_FILE" -d ajg/
        ls -la ajg/
        
    - name: Rename folder
      run: |
        cd ajg/
        if [ -d "UBOT_HANZZPRO210" ]; then
          mv UBOT_HANZZPRO210 UbotModul500v3
        fi
        ls -la
        
    - name: Setup Python
      run: |
        cd ajg/
        python3 -m venv ubotMacha
        source ubotMacha/bin/activate
        pip3 install --upgrade pip
        pip3 install tornado pyrogram tgcrypto pillow pymongo motor
        
    - name: Install req
      run: |
        cd ajg/
        source ubotMacha/bin/activate
        
        if [ -f "UbotModul500v3/requirements.txt" ]; then
          pip3 install -r UbotModul500v3/requirements.txt || true
        elif [ -f "requirements.txt" ]; then
          pip3 install -r requirements.txt || true
        fi
        
        if [ -f "UbotModul500v3/PyroUbot/requirements.txt" ]; then
          pip3 install -r UbotModul500v3/PyroUbot/requirements.txt || true
        fi
        
        pip3 install aiohttp aiofiles beautifulsoup4 requests pytz python-dotenv psutil
        
    - name: Setup .env from sample.env
      run: |
        cd ajg/
        
        # Cari sample.env di berbagai lokasi
        if [ -f "UbotModul500v3/sample.env" ]; then
          cp UbotModul500v3/sample.env .env
          echo "✅ .env created from UbotModul500v3/sample.env"
        elif [ -f "sample.env" ]; then
          cp sample.env .env
          echo "✅ .env created from sample.env"
        elif [ -f "UbotModul500v3/PyroUbot/sample.env" ]; then
          cp UbotModul500v3/PyroUbot/sample.env .env
          echo "✅ .env created from UbotModul500v3/PyroUbot/sample.env"
        elif [ -f "PyroUbot/sample.env" ]; then
          cp PyroUbot/sample.env .env
          echo "✅ .env created from PyroUbot/sample.env"
        else
          echo "⚠️ sample.env not found, creating empty .env"
          touch .env
        fi
        
        echo "📄 .env content:"
        cat .env
        
    - name: Run Ubot
      run: |
        cd ajg/
        source ubotMacha/bin/activate
        
        if [ -d "UbotModul500v3/PyroUbot" ]; then
          cd UbotModul500v3/PyroUbot
        elif [ -d "PyroUbot" ]; then
          cd PyroUbot
        else
          echo "PyroUbot not found!"
          find . -type d -name "PyroUbot"
          exit 1
        fi
        
        export PYTHONPATH="$(pwd)/..:$(pwd):$PYTHONPATH"
        echo "PYTHONPATH: $PYTHONPATH"
        echo "Current directory: $(pwd)"
        echo "Files:"
        ls -la
        
        python3 __main__.py
    