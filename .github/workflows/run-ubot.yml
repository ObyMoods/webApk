name: Run Ubot UbotModul700___1_

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-ubot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Install system dependencies
      run: |
        echo "📦 Installing system dependencies..."
        sudo apt-get update
        sudo apt-get install -y           python3-pip           python3-venv           libjpeg-dev           zlib1g-dev           libpng-dev           libwebp-dev           libtiff-dev           libfreetype6-dev           libopenjp2-7-dev           libssl-dev           ffmpeg           git           wget           curl           unzip
        echo "✅ System dependencies installed"
        
    - name: Extract ZIP file
      run: |
        echo "📦 Extracting ZIP file..."
        ZIP_FILE=$(find . -name "*.zip" -type f | head -1)
        echo "ZIP file found: $ZIP_FILE"
        
        if [ -z "$ZIP_FILE" ]; then
          echo "❌ No ZIP file found!"
          exit 1
        fi
        
        mkdir -p project/
        unzip -o "$ZIP_FILE" -d project/
        echo "✅ Extraction complete!"
        echo ""
        echo "📂 Project files:"
        ls -la project/
        
    - name: Install Node.js (if needed)
      run: |
        cd project/
        if [ -f "installnode.sh" ]; then
          echo "📦 Running installnode.sh..."
          bash installnode.sh
        else
          echo "⏭️ installnode.sh not found, skipping..."
        fi
        
    - name: Setup Python Virtual Environment
      run: |
        cd project/
        echo "🐍 Creating virtual environment..."
        python3 -m venv ubotMacha
        echo "✅ Virtual environment created"
        
    - name: Install Python dependencies
      run: |
        cd project/
        source ubotMacha/bin/activate
        
        echo "🔄 Activating virtual environment..."
        python3 --version
        pip3 --version
        
        echo "📦 Upgrading pip..."
        pip3 install --upgrade pip
        
        echo "📦 Installing core dependencies..."
        pip3 install tornado pyrogram tgcrypto
        
        echo "📦 Installing Pillow with wheel..."
        pip3 install pillow --only-binary=pillow || pip3 install pillow
        
        echo "📦 Installing requirements.txt if exists..."
        if [ -f "UbotModul500v3/requirements.txt" ]; then
          echo "📦 Installing from UbotModul500v3/requirements.txt..."
          pip3 install -r UbotModul500v3/requirements.txt || echo "⚠️ Some packages failed, continuing..."
        elif [ -f "PyroUbot/requirements.txt" ]; then
          echo "📦 Installing from PyroUbot/requirements.txt..."
          pip3 install -r PyroUbot/requirements.txt || echo "⚠️ Some packages failed, continuing..."
        elif [ -f "requirements.txt" ]; then
          echo "📦 Installing requirements.txt..."
          pip3 install -r requirements.txt || echo "⚠️ Some packages failed, continuing..."
        else
          echo "⏭️ requirements.txt not found, skipping..."
        fi
        
        echo "📦 Installing additional common packages..."
        pip3 install aiohttp aiofiles beautifulsoup4 requests
        pip3 install pytz python-dotenv psutil
        
        echo "📦 Installed packages:"
        pip3 list | head -40
        
    - name: Setup environment variables
      run: |
        cd project/
        
        SAMPLE_ENV=""
        
        if [ -f "UbotModul500v3/PyroUbot/sample.env" ]; then
          SAMPLE_ENV="UbotModul500v3/PyroUbot/sample.env"
        elif [ -f "UbotModul500v3/sample.env" ]; then
          SAMPLE_ENV="UbotModul500v3/sample.env"
        elif [ -f "PyroUbot/sample.env" ]; then
          SAMPLE_ENV="PyroUbot/sample.env"
        elif [ -f "sample.env" ]; then
          SAMPLE_ENV="sample.env"
        fi
        
        if [ -n "$SAMPLE_ENV" ]; then
          echo "⚙️ Copying sample.env to .env..."
          cp "$SAMPLE_ENV" .env
          echo "📄 .env content:"
          cat .env
        else
          echo "⏭️ sample.env not found, creating empty .env..."
          touch .env
          echo "✅ Empty .env created"
        fi
        
    - name: Run Ubot
      run: |
        cd project/
        source ubotMacha/bin/activate
        
        echo "🚀 Starting Ubot..."
        echo "📂 Current directory: $(pwd)"
        echo "📂 Files in current directory:"
        ls -la
        
        if [ -d "UbotModul500v3/PyroUbot" ]; then
          echo "✅ Found UbotModul500v3/PyroUbot"
          cd UbotModul500v3/PyroUbot
        elif [ -d "PyroUbot" ]; then
          echo "✅ Found PyroUbot"
          cd PyroUbot
        else
          echo "🔍 Searching for PyroUbot..."
          UBOBOT_DIR=$(find . -type d -name "PyroUbot" | head -1)
          if [ -n "$UBOBOT_DIR" ]; then
            echo "✅ Found PyroUbot at: $UBOBOT_DIR"
            cd "$UBOBOT_DIR"
          fi
        fi
        
        echo "📂 Files in PyroUbot directory:"
        ls -la
        echo "📂 Current directory: $(pwd)"
        echo "📂 PYTHONPATH: $PYTHONPATH"
        
        # Coba jalankan dengan berbagai cara
        if [ -f "__main__.py" ]; then
          echo "✅ Found __main__.py, running with PYTHONPATH..."
          python3 __main__.py
        elif [ -f "main.py" ]; then
          echo "✅ Found main.py, running..."
          python3 main.py
        elif [ -f "bot.py" ]; then
          echo "✅ Found bot.py, running..."
          python3 bot.py
        elif [ -f "app.py" ]; then
          echo "✅ Found app.py, running..."
          python3 app.py
        else
          # Coba jalankan sebagai module
          echo "🔍 Trying to run as module..."
          cd ..
          python3 -m PyroUbot || python3 -c "import PyroUbot; PyroUbot.main()"
        fi
      continue-on-error: false
    