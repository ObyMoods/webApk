name: Run Ubot UbotModul700___1_

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-ubot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: List files in repository
      run: |
        echo "📂 Files in repository:"
        ls -la
        echo ""
        echo "📂 Finding ZIP files..."
        find . -name "*.zip" -type f
        
    - name: Extract ZIP file
      run: |
        echo "📦 Extracting ZIP file..."
        ZIP_FILE=$(find . -name "*.zip" -type f | head -1)
        echo "ZIP file found: $ZIP_FILE"
        
        if [ -z "$ZIP_FILE" ]; then
          echo "❌ No ZIP file found!"
          exit 1
        fi
        
        mkdir -p project/
        unzip -o "$ZIP_FILE" -d project/
        echo "✅ Extraction complete!"
        echo ""
        echo "📂 Project files:"
        ls -la project/
        
    - name: Find Ubot directory
      id: find_ubot
      run: |
        echo "🔍 Searching for PyroUbot directory..."
        
        UBOBOT_DIR=$(find project/ -type d -name "PyroUbot" | head -1)
        PARENT_DIR=$(dirname "$UBOBOT_DIR" 2>/dev/null || echo "project/")
        
        if [ -n "$UBOBOT_DIR" ]; then
          echo "✅ Found PyroUbot at: $UBOBOT_DIR"
          echo "ubot_dir=$UBOBOT_DIR" >> $GITHUB_OUTPUT
          echo "ubot_parent=$PARENT_DIR" >> $GITHUB_OUTPUT
        else
          echo "⚠️ PyroUbot directory not found, using project/ as base"
          echo "ubot_dir=project/" >> $GITHUB_OUTPUT
          echo "ubot_parent=project/" >> $GITHUB_OUTPUT
        fi
        
        echo "📂 Directory structure:"
        find project/ -type d -maxdepth 3
        
    - name: Install Node.js (if needed)
      run: |
        cd project/
        if [ -f "installnode.sh" ]; then
          echo "📦 Running installnode.sh..."
          bash installnode.sh
        else
          echo "⏭️ installnode.sh not found, skipping..."
        fi
        
    - name: Setup Python Virtual Environment
      run: |
        cd project/
        echo "🐍 Creating virtual environment..."
        python3 -m venv ubotMacha
        echo "✅ Virtual environment created"
        
    - name: Activate venv and install requirements
      run: |
        cd project/
        echo "🔄 Activating virtual environment..."
        source ubotMacha/bin/activate
        python3 --version
        pip3 --version
        
        if [ -f "requirements.txt" ]; then
          echo "📦 Installing requirements.txt..."
          pip3 install -r requirements.txt
        else
          echo "⏭️ requirements.txt not found, skipping..."
        fi
        
    - name: Setup environment variables
      run: |
        cd project/
        
        SAMPLE_ENV=""
        
        if [ -f "sample.env" ]; then
          SAMPLE_ENV="sample.env"
          echo "✅ Found sample.env at root"
        elif [ -f "UbotModul500v3/sample.env" ]; then
          SAMPLE_ENV="UbotModul500v3/sample.env"
          echo "✅ Found sample.env at UbotModul500v3/"
        elif [ -f "PyroUbot/sample.env" ]; then
          SAMPLE_ENV="PyroUbot/sample.env"
          echo "✅ Found sample.env at PyroUbot/"
        elif [ -f "project/sample.env" ]; then
          SAMPLE_ENV="project/sample.env"
          echo "✅ Found sample.env at project/"
        fi
        
        if [ -n "$SAMPLE_ENV" ]; then
          echo "⚙️ Copying sample.env to .env..."
          cp "$SAMPLE_ENV" ".env"
          echo "📄 .env content:"
          cat .env
        else
          echo "⏭️ sample.env not found, creating empty .env..."
          touch .env
          echo "✅ Empty .env created"
        fi
        
    - name: List Python files before run
      run: |
        echo "📂 Python files in project:"
        find . -name "*.py" -type f | head -20
        
    - name: Run Ubot
      run: |
        cd project/
        source ubotMacha/bin/activate
        
        echo "🚀 Starting Ubot..."
        echo "📂 Current directory: $(pwd)"
        echo "📂 Files in current directory:"
        ls -la
        
        # Coba cari PyroUbot
        if [ -d "PyroUbot" ]; then
          echo "✅ PyroUbot directory found!"
          cd PyroUbot
          echo "📂 Files in PyroUbot:"
          ls -la
          
          if [ -f "__main__.py" ]; then
            echo "✅ Found __main__.py, running..."
            python3 __main__.py
          elif [ -f "main.py" ]; then
            echo "✅ Found main.py, running..."
            python3 main.py
          else
            echo "🔍 Searching for entry point..."
            MAIN_FILE=$(find . -maxdepth 1 -name "*.py" -type f | grep -v "__" | head -1)
            if [ -n "$MAIN_FILE" ]; then
              echo "✅ Found: $MAIN_FILE, running..."
              python3 $MAIN_FILE
            else
              echo "❌ No Python entry file found in PyroUbot!"
              echo "📂 Listing all Python files:"
              find . -name "*.py" -type f
              exit 1
            fi
          fi
        elif [ -d "UbotModul500v3" ]; then
          echo "✅ UbotModul500v3 directory found!"
          cd UbotModul500v3
          
          if [ -d "PyroUbot" ]; then
            cd PyroUbot
            echo "📂 Files in PyroUbot:"
            ls -la
            
            if [ -f "__main__.py" ]; then
              echo "✅ Found __main__.py, running..."
              python3 __main__.py
            elif [ -f "main.py" ]; then
              echo "✅ Found main.py, running..."
              python3 main.py
            else
              echo "🔍 Searching for entry point..."
              MAIN_FILE=$(find . -maxdepth 1 -name "*.py" -type f | grep -v "__" | head -1)
              if [ -n "$MAIN_FILE" ]; then
                echo "✅ Found: $MAIN_FILE, running..."
                python3 $MAIN_FILE
              else
                echo "❌ No Python entry file found!"
                echo "📂 Listing all Python files:"
                find . -name "*.py" -type f
                exit 1
              fi
            fi
          fi
        else
          echo "🔍 Searching for Python entry point in project..."
          MAIN_FILE=$(find . -maxdepth 2 -name "*.py" -type f | grep -v "__" | head -1)
          if [ -n "$MAIN_FILE" ]; then
            echo "✅ Found: $MAIN_FILE, running..."
            python3 $MAIN_FILE
          else
            echo "❌ No Python entry file found!"
            echo "📂 Listing all Python files:"
            find . -name "*.py" -type f
            exit 1
          fi
        fi
      continue-on-error: false
    