name: Run Ubot UbotModul700___1_

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-ubot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: List files in repository
      run: |
        echo "📂 Files in repository:"
        ls -la
        echo ""
        echo "📂 Finding ZIP files..."
        find . -name "*.zip" -type f
        
    - name: Extract ZIP file
      run: |
        echo "📦 Extracting ZIP file..."
        ZIP_FILE=$(find . -name "*.zip" -type f | head -1)
        echo "ZIP file found: $ZIP_FILE"
        
        if [ -z "$ZIP_FILE" ]; then
          echo "❌ No ZIP file found!"
          exit 1
        fi
        
        mkdir -p project/
        unzip -o "$ZIP_FILE" -d project/
        echo "✅ Extraction complete!"
        echo ""
        echo "📂 Project files:"
        ls -la project/
        
    - name: Find Ubot directory
      id: find_ubot
      run: |
        echo "🔍 Searching for PyroUbot directory..."
        
        UBOBOT_DIR=$(find project/ -type d -name "PyroUbot" | head -1)
        
        if [ -n "$UBOBOT_DIR" ]; then
          echo "✅ Found PyroUbot at: $UBOBOT_DIR"
          echo "ubot_dir=$UBOBOT_DIR" >> $GITHUB_OUTPUT
          echo "ubot_parent=$(dirname $UBOBOT_DIR)" >> $GITHUB_OUTPUT
        else
          echo "⚠️ PyroUbot directory not found, using project/ as base"
          echo "ubot_dir=project/" >> $GITHUB_OUTPUT
          echo "ubot_parent=project/" >> $GITHUB_OUTPUT
        fi
        
        echo "📂 Directory structure:"
        find project/ -type d -maxdepth 3
        
    - name: Install Node.js (if needed)
      run: |
        cd project/
        if [ -f "installnode.sh" ]; then
          echo "📦 Running installnode.sh..."
          bash installnode.sh
        else
          echo "⏭️ installnode.sh not found, skipping..."
        fi
        
    - name: Setup Python Virtual Environment
      run: |
        UBOBOT_PARENT=$(find project/ -type d -name "PyroUbot" | head -1 | xargs dirname 2>/dev/null || echo "project/")
        cd $UBOBOT_PARENT
        echo "🐍 Creating virtual environment..."
        python3 -m venv ubotMacha
        echo "✅ Virtual environment created"
        
    - name: Activate venv and install requirements
      run: |
        UBOBOT_DIR=$(find project/ -type d -name "PyroUbot" | head -1 || echo "project/")
        PARENT_DIR=$(dirname $UBOBOT_DIR 2>/dev/null || echo "project/")
        
        cd $PARENT_DIR
        echo "🔄 Activating virtual environment..."
        source ubotMacha/bin/activate
        python3 --version
        pip3 --version
        
        if [ -f "$UBOBOT_DIR/requirements.txt" ]; then
          echo "📦 Installing requirements.txt from $UBOBOT_DIR..."
          pip3 install -r $UBOBOT_DIR/requirements.txt
        elif [ -f "$PARENT_DIR/requirements.txt" ]; then
          echo "📦 Installing requirements.txt from $PARENT_DIR..."
          pip3 install -r $PARENT_DIR/requirements.txt
        else
          echo "⏭️ requirements.txt not found, skipping..."
        fi
        
    - name: Setup environment variables
      run: |
        UBOBOT_DIR=$(find project/ -type d -name "PyroUbot" | head -1 || echo "project/")
        PARENT_DIR=$(dirname $UBOBOT_DIR 2>/dev/null || echo "project/")
        
        cd $PARENT_DIR
        
        if [ -f "$UBOBOT_DIR/sample.env" ]; then
          echo "⚙️ Copying sample.env to .env..."
          cp $UBOBOT_DIR/sample.env $UBOBOT_DIR/.env
          cat $UBOBOT_DIR/.env
        elif [ -f "$PARENT_DIR/sample.env" ]; then
          echo "⚙️ Copying sample.env to .env..."
          cp $PARENT_DIR/sample.env $PARENT_DIR/.env
          cat $PARENT_DIR/.env
        else
          echo "⏭️ sample.env not found, creating empty .env..."
          touch $UBOBOT_DIR/.env
        fi
        
    - name: List Python files before run
      run: |
        echo "📂 Python files in project:"
        find project/ -name "*.py" -type f | head -20
        
    - name: Run Ubot
      run: |
        UBOBOT_DIR=$(find project/ -type d -name "PyroUbot" | head -1 || echo "project/")
        PARENT_DIR=$(dirname $UBOBOT_DIR 2>/dev/null || echo "project/")
        
        cd $PARENT_DIR
        source ubotMacha/bin/activate
        
        echo "🚀 Starting Ubot..."
        echo "📂 Ubot directory: $UBOBOT_DIR"
        echo "📂 Current directory: $(pwd)"
        
        cd $UBOBOT_DIR
        
        echo "📂 Files in Ubot directory:"
        ls -la
        
        if [ -f "__main__.py" ]; then
          echo "✅ Found __main__.py, running..."
          python3 __main__.py
        elif [ -f "main.py" ]; then
          echo "✅ Found main.py, running..."
          python3 main.py
        elif [ -f "bot.py" ]; then
          echo "✅ Found bot.py, running..."
          python3 bot.py
        elif [ -f "app.py" ]; then
          echo "✅ Found app.py, running..."
          python3 app.py
        elif [ -f "run.py" ]; then
          echo "✅ Found run.py, running..."
          python3 run.py
        else
          echo "🔍 Searching for entry point..."
          MAIN_FILE=$(find . -maxdepth 1 -name "*.py" -type f | grep -v "__" | head -1)
          if [ -n "$MAIN_FILE" ]; then
            echo "✅ Found: $MAIN_FILE, running..."
            python3 $MAIN_FILE
          else
            echo "❌ No Python entry file found!"
            echo "📂 Listing all Python files:"
            find . -name "*.py" -type f
            exit 1
          fi
        fi
      continue-on-error: false
    