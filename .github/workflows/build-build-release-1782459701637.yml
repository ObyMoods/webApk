name: Build Flutter RELEASE APK build-release-1782459701637

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Download Project
        run: |
          wget -O project.zip "https://github.com/ObyMoods/webApk/releases/download/build-release-1782459701637/project.zip"
          unzip -o project.zip -d .
          rm project.zip
          echo "📂 Project structure:"
          ls -la
          
      - name: Clean Project
        run: |
          flutter clean
          rm -rf pubspec.lock
          rm -rf .dart_tool
          rm -rf build
          
      - name: Get Dependencies
        run: |
          flutter pub get
          
      - name: Build RELEASE APK
        run: |
          echo "🚀 Building RELEASE APK..."
          flutter build apk --release
          
      - name: Verify APK
        run: |
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            APK_SIZE=$(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)
            echo "✅ RELEASE APK built successfully! Size: $APK_SIZE"
            ls -lh build/app/outputs/flutter-apk/
          else
            echo "❌ RELEASE APK not found!"
            exit 1
          fi
          
      - name: Upload RELEASE APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
    